name: xpm_app
description: XPM — Mekari Expense Mobile App (Flutter implementation)
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Mekari Pixel 2.4 design system
  mekari_pixel:
    git:
      url: https://github.com/mekari-engineering/mekari-pixel-flutter.git
      ref: main

  # Navigation
  go_router: ^13.0.0

  # Camera & image
  camera: ^0.10.0
  image_picker: ^1.0.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
